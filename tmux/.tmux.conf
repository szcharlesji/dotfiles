set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Terminal Title
set-option -g set-titles on
# set-option -g set-titles-string "#S: #W - #{b:pane_current_path}"
set-option -g set-titles-string "#W - #{b:pane_current_path}"
set-window-option -g automatic-rename on

# not setting the prefix key to C-a
# set -g prefix C-a
# unbind C-b
# bind-key C-b send-prefix

# reload config file
unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

bind M-0 switch -t default

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 3
bind -r k resize-pane -U 3
bind -r l resize-pane -R 3
bind -r h resize-pane -L 3

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

set -g mode-style "fg=#000000,bg=#8DB5FE"
set -g pane-active-border-style fg="#8DB5FE"
set -g message-style "fg=#000000,bg=#8DB5FE"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tmux-open'
# set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'jaclu/tmux-menus'

set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @minimal-tmux-bg "#8DB5FE"
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-right false
set -g @minimal-tmux-left false
set -g status off
bind-key b set-option status

run "~/.tmux/plugins/tpm/tpm"
